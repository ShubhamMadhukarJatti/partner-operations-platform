<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sharkdom | Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #0b5cff, #00c6ff);
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      color: #333;
      max-width: 520px;
      width: 90%;
      padding: 40px;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      color: #0b5cff;
      margin-bottom: 25px;
    }

    .emoji {
      font-size: 70px;
      margin-bottom: 15px;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      font-size: 15px;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      background: #0b5cff;
      color: #fff;
      padding: 14px 28px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #084bd6;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(11,92,255,0.35);
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="card">
   <div class="logo">
  <img src="https://storage.googleapis.com/sharkdom_resources/new-logo.01a51e91.svg"
       alt="Sharkdom"
       class="logo-img">
</div>


    <div class="emoji">🚧</div>

    <h1>Page Not Found</h1>
    <p>
      The page you’re looking for doesn’t exist or has been moved.<br>
      Let’s get you back on track.
    </p>

    <a class="btn" href="https://getsharkdom.com">
      Go to Sharkdom Home
    </a>

    <div class="footer">
      © 2026 Sharkdom. All rights reserved.
    </div>
  </div>
</body>
</html>
